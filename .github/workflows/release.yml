name: release

# Publish a multi-arch image on a semver tag. latest is published here because
# tags are cut from the default branch; immutable version tags are the contract.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true
      - run: go test -race ./...

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from the tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/memcored:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/memcored:latest
          provenance: true
          sbom: true

      # Optional: sign the published image with cosign in keyless mode. Left
      # commented so a fork without the identity configured still releases.
      # - uses: sigstore/cosign-installer@v3
      # - run: cosign sign --yes ${{ secrets.DOCKERHUB_USERNAME }}/memcored@${{ steps.build.outputs.digest }}
